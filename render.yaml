services:
  - type: web
    name: teum-seoul-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python scripts/init_db.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./teum_seoul.db
      - key: DATA_DIR
        value: ../data/raw/seoul
      - key: FRONTEND_ORIGIN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
